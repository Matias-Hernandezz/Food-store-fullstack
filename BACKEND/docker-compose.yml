version: '3.8'
services:

  db:
    image: postgres:15
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: db-parcial-1
    ports:
      - "5555:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./BACKEND
    container_name: backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: db-parcial-1
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      SECRET_KEY: dev-super-secret-key-32-chars-minimo
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
    depends_on:
      - db
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  admin:
    build: ./FRONTEND
    container_name: admin
    restart: always
    ports:
      - "5173:80"
    depends_on:
      - backend

  store:
    build: ./STORE
    container_name: store
    restart: always
    ports:
      - "5174:80"
    depends_on:
      - backend

volumes:
  postgres_data:
